<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piloo — Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --surface-subtle: #f1ede2;
    --border: #e5e0d3;
    --primary: #4a6b64;
    --primary-soft: #dbe3e0;
    --accent: #a8472e;
    --accent-soft: #f3d9cd;
    --text: #252a30;
    --text-2: #6b7280;
    --text-3: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar a.home {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--primary);
    text-decoration: none;
  }
  .topbar a.home .oo { color: var(--accent); }
  .topbar nav { display: flex; gap: 16px; flex-wrap: wrap; }
  .topbar nav a {
    font-size: 13px;
    color: var(--text-2);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .topbar nav a:hover { background: var(--surface-subtle); color: var(--text); }
  .topbar nav a.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }
  @media (max-width: 720px) { .container { padding: 32px 20px 64px; } .topbar { padding: 12px 16px; } }

  .breadcrumb {
    font-size: 12px;
    color: var(--text-3);
    margin-bottom: 24px;
  }
  .breadcrumb a { color: var(--text-2); text-decoration: none; }
  .breadcrumb a:hover { color: var(--primary); }

  .loading {
    color: var(--text-3);
    font-style: italic;
  }
  .error {
    background: #fdf2e9;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 16px 20px;
    border-radius: 12px;
  }

  /* markdown content */
  .content {
    font-size: 16px;
    color: var(--text);
  }
  .content h1 {
    font-family: 'Fraunces', serif;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .content h2 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.2px;
    margin: 48px 0 16px;
  }
  .content h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin: 32px 0 12px;
  }
  .content h4 {
    font-size: 17px;
    font-weight: 700;
    margin: 24px 0 8px;
  }
  .content p { margin: 12px 0; color: var(--text); }
  .content a { color: var(--primary); }
  .content a:hover { text-decoration: underline; }
  .content strong { font-weight: 700; color: var(--text); }
  .content em { font-style: italic; color: var(--text-2); }
  .content blockquote {
    border-left: 3px solid var(--accent);
    background: var(--surface-subtle);
    padding: 12px 20px;
    margin: 20px 0;
    color: var(--text-2);
    border-radius: 0 8px 8px 0;
  }
  .content ul, .content ol {
    margin: 12px 0 12px 24px;
    color: var(--text);
  }
  .content li { margin: 6px 0; }
  .content li::marker { color: var(--primary); }
  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }
  .content code {
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 0.88em;
    background: var(--surface-subtle);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }
  .content pre {
    background: #1a1a1a;
    color: #e6e6e6;
    padding: 16px 20px;
    border-radius: 10px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .content pre code {
    background: none;
    color: inherit;
    padding: 0;
    font-size: inherit;
  }
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }
  .content th {
    background: var(--surface-subtle);
    text-align: left;
    padding: 10px 14px;
    border: 1px solid var(--border);
    font-weight: 700;
    font-size: 13px;
  }
  .content td {
    padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .content tr:nth-child(even) td {
    background: var(--bg);
  }
  .content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 16px 0;
  }

  /* task list (GFM) */
  .content input[type=checkbox] { margin-right: 8px; }

  .foot {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-3);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .foot a { color: var(--text-2); text-decoration: none; }
  .foot a:hover { color: var(--primary); }

  .toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin: 0 0 32px;
  }
  .toc-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .toc ul { list-style: none; margin: 0; }
  .toc ul ul { margin-left: 16px; }
  .toc li { margin: 4px 0; }
  .toc a {
    text-decoration: none;
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.5;
  }
  .toc a:hover { color: var(--primary); }
</style>
</head>
<body>
<div class="topbar">
  <a class="home" href="../"><span>pil</span><span class="oo">oo</span></a>
  <nav id="doc-nav">
    <a href="?doc=dossier-cadrage.md" data-doc="dossier-cadrage.md">Cadrage</a>
    <a href="?doc=spec.md" data-doc="spec.md">Spec</a>
    <a href="?doc=architecture.md" data-doc="architecture.md">Architecture</a>
    <a href="?doc=data-model.md" data-doc="data-model.md">Data model</a>
    <a href="?doc=api-contract.md" data-doc="api-contract.md">API</a>
    <a href="?doc=ui-ux-guidelines.md" data-doc="ui-ux-guidelines.md">UI/UX</a>
    <a href="?doc=roadmap.md" data-doc="roadmap.md">Roadmap</a>
  </nav>
</div>

<div class="container">
  <div class="breadcrumb"><a href="../">← Project hub</a></div>
  <div id="content" class="content">
    <p class="loading">Chargement…</p>
  </div>
  <div class="foot">
    <div><a href="../">← Retour au hub</a></div>
    <div><a id="raw-link" href="">Voir source Markdown</a></div>
  </div>
</div>

<script>
  const VALID_DOCS = [
    'dossier-cadrage.md',
    'spec.md',
    'architecture.md',
    'data-model.md',
    'api-contract.md',
    'ui-ux-guidelines.md',
    'roadmap.md'
  ];

  const params = new URLSearchParams(location.search);
  let doc = params.get('doc') || 'dossier-cadrage.md';
  // path traversal protection: only whitelisted filenames
  if (!VALID_DOCS.includes(doc)) {
    doc = 'dossier-cadrage.md';
  }

  // highlight active nav
  document.querySelectorAll('[data-doc]').forEach(a => {
    if (a.getAttribute('data-doc') === doc) a.classList.add('active');
  });
  document.getElementById('raw-link').href = './' + doc;

  const renderer = new marked.Renderer();
  renderer.heading = (text, level) => {
    const slug = String(text).toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
    return `<h${level} id="${slug}">${text}</h${level}>`;
  };
  marked.use({ renderer, gfm: true, breaks: false });

  fetch('./' + doc)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(md => {
      const raw = marked.parse(md);
      const clean = window.DOMPurify ? DOMPurify.sanitize(raw) : raw;
      document.getElementById('content').innerHTML = clean;
      const firstH = document.querySelector('.content h1');
      document.title = 'Piloo · ' + (firstH ? firstH.textContent : doc.replace('.md', ''));

      // build toc if doc is long
      const headings = document.querySelectorAll('.content h2, .content h3');
      if (headings.length >= 4) {
        const toc = document.createElement('nav');
        toc.className = 'toc';
        toc.innerHTML = '<div class="toc-title">Sur cette page</div><ul></ul>';
        const ul = toc.querySelector('ul');
        let lastH2 = null;
        headings.forEach(h => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.textContent;
          li.appendChild(a);
          if (h.tagName === 'H2') {
            ul.appendChild(li);
            lastH2 = li;
          } else if (h.tagName === 'H3' && lastH2) {
            let subUl = lastH2.querySelector('ul');
            if (!subUl) {
              subUl = document.createElement('ul');
              lastH2.appendChild(subUl);
            }
            subUl.appendChild(li);
          } else {
            ul.appendChild(li);
          }
        });
        const h1 = document.querySelector('.content h1');
        if (h1) h1.after(toc);
      }
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        '<div class="error">Impossible de charger <code>' + doc + '</code>.<br>' +
        '<small>' + err.message + '</small></div>';
    });
</script>
</body>
</html>
