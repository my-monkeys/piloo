paths:
  /health:
    get:
      summary: Liveness probe
      description: Renvoie le statut du serveur. Utilisé par les health checks Vercel et le monitoring.
      tags:
        - health
      responses:
        "200":
          description: Serveur OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/officines:
    get:
      summary: Liste les officines accessibles à l'utilisateur courant
      description: Renvoie les officines dont l'utilisateur est propriétaire OU sur lesquelles il a un partage actif.
      tags:
        - officines
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOfficinesResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Crée une officine
      description: L'utilisateur courant devient propriétaire et un partage owner est créé automatiquement.
      tags:
        - officines
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfficineInput"
      responses:
        "201":
          description: Officine créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/officines/{id}:
    get:
      summary: Détail d'une officine
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Détail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas d'accès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Met à jour une officine
      description: Réservé aux rôles owner et editor.
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfficineInput"
      responses:
        "200":
          description: Officine mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Supprime (soft-delete) une officine
      description: Réservé au propriétaire (rôle owner).
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Supprimée
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/officines/{officineId}/boites:
    get:
      summary: Liste les boîtes d'une officine
      description: Renvoie les boîtes non soft-deleted, triées par création décroissante.
      tags:
        - boites
      parameters:
        - schema:
            type: string
