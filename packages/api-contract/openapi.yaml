openapi: 3.1.0
info:
  title: Piloo API
  version: 0.0.0
  description: "API REST de Piloo — carnet numérique de médicaments. Source de vérité : les schémas Zod du package @piloo/api-contract."
servers:
  - url: http://localhost:3000/api
    description: Local dev
  - url: https://piloo.fr/api
    description: Production
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        version:
          type: string
          example: 0.0.0
        timestamp:
          type: string
          format: date-time
          example: 2026-05-02T12:00:00.000Z
      required:
        - status
        - version
        - timestamp
    ListOfficinesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Officine"
      required:
        - items
    Officine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        proprietaire_user_id:
          type: string
          format: uuid
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
        role:
          type: string
          enum:
            - owner
            - editor
            - viewer
      required:
        - id
        - nom
        - type
        - proprietaire_user_id
        - date_naissance
        - notes
        - created_at
        - updated_at
        - deleted_at
        - role
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    CreateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - nom
        - type
    UpdateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
    ListBoitesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Boite"
      required:
        - items
    Boite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officine_id:
          type: string
          format: uuid
        cip13:
          type: string
          pattern: ^\d{13}$
        lot:
          type:
            - string
            - "null"
          maxLength: 64
        numero_serie:
          type:
            - string
            - "null"
          maxLength: 64
        peremption:
          type: string
          format: date
        unites_initiales:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        statut:
          type: string
          enum:
            - active
            - vide
            - perimee
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        ajoutee_par:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
      required:
        - id
        - officine_id
        - cip13
        - lot
        - numero_serie
        - peremption
        - unites_initiales
        - unites_restantes
        - statut
        - notes
        - ajoutee_par
        - created_at
        - updated_at
        - deleted_at
    BoiteApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    CreateBoiteInput:
      type: object
      properties:
        cip13:
          type: string
          pattern: ^\d{13}$
        lot:
          type:
            - string
            - "null"
          maxLength: 64
        numero_serie:
          type:
            - string
            - "null"
          maxLength: 64
        peremption:
          type: string
          format: date
        unites_initiales:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - cip13
        - peremption
    UpdateBoiteInput:
      type: object
      properties:
        statut:
          type: string
          enum:
            - active
            - vide
            - perimee
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
    SyncPushResponse:
      type: object
      properties:
        acks:
          type: array
          items:
            $ref: "#/components/schemas/SyncAck"
        server_time:
          type: string
          format: date-time
      required:
        - acks
        - server_time
    SyncAck:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - applied
            - conflict
            - rejected
        reason:
          type: string
        server_version:
          $ref: "#/components/schemas/Boite"
      required:
        - operation_id
        - entity_id
        - status
    SyncApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    SyncPushRequest:
      type: object
      properties:
        client_id:
          type: string
          minLength: 1
          maxLength: 120
        operations:
          type: array
          items:
            oneOf:
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - create_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    allOf:
                      - $ref: "#/components/schemas/CreateBoiteInput"
                      - type: object
                        properties:
                          officine_id:
                            type: string
                            format: uuid
                        required:
                          - officine_id
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - update_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    $ref: "#/components/schemas/UpdateBoiteInput"
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - soft_delete_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    type: object
                    properties: {}
                    additionalProperties: false
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
          minItems: 1
          maxItems: 100
      required:
        - client_id
        - operations
    SyncPullResponse:
      type: object
      properties:
        entities:
          type: object
          properties:
            boites:
              type: array
              items:
                $ref: "#/components/schemas/Boite"
          required:
            - boites
        deleted:
          type: object
          properties:
            boites:
              type: array
              items:
                type: string
                format: uuid
          required:
            - boites
        server_time:
          type: string
          format: date-time
      required:
        - entities
        - deleted
        - server_time
  parameters: {}
paths:
  /health:
    get:
      summary: Liveness probe
      description: Renvoie le statut du serveur. Utilisé par les health checks Vercel et le monitoring.
      tags:
        - health
      responses:
        "200":
          description: Serveur OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/officines:
    get:
      summary: Liste les officines accessibles à l'utilisateur courant
      description: Renvoie les officines dont l'utilisateur est propriétaire OU sur lesquelles il a un partage actif.
      tags:
        - officines
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOfficinesResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Crée une officine
      description: L'utilisateur courant devient propriétaire et un partage owner est créé automatiquement.
      tags:
        - officines
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfficineInput"
      responses:
        "201":
          description: Officine créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/officines/{id}:
    get:
      summary: Détail d'une officine
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Détail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas d'accès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Met à jour une officine
      description: Réservé aux rôles owner et editor.
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfficineInput"
      responses:
        "200":
          description: Officine mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Supprime (soft-delete) une officine
      description: Réservé au propriétaire (rôle owner).
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Supprimée
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/officines/{officineId}/boites:
    get:
      summary: Liste les boîtes d'une officine
      description: Renvoie les boîtes non soft-deleted, triées par création décroissante.
      tags:
        - boites
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: officineId
          in: path
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBoitesResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Pas d'accès à l'officine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Officine introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
    post:
      summary: Crée une boîte dans une officine
      description: Réservé aux rôles owner et editor.
      tags:
        - boites
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: officineId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoiteInput"
      responses:
        "201":
          description: Boîte créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boite"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Officine introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
  /v1/boites/{id}:
    get:
      summary: Détail d'une boîte
      tags:
        - boites
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Détail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boite"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Pas d'accès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
    patch:
      summary: Met à jour une boîte (stock, statut, notes)
      description: Réservé aux rôles owner et editor sur l'officine de la boîte.
      tags:
        - boites
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoiteInput"
      responses:
        "200":
          description: Boîte mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boite"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
    delete:
      summary: Supprime (soft-delete) une boîte
      description: Réservé aux rôles owner et editor sur l'officine de la boîte.
      tags:
        - boites
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Supprimée
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
  /v1/sync/push:
    post:
      summary: Pousse un batch d'opérations locales vers le serveur
      description: Idempotent par operation_id. Maximum 100 opérations par requête. Renvoie un ack par opération (applied | conflict | rejected).
      tags:
        - sync
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushRequest"
      responses:
        "200":
          description: Acks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPushResponse"
        "400":
          description: Body invalide ou batch > 100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
  /v1/sync/pull:
    get:
      summary: Récupère les entités modifiées depuis un timestamp
      description: Renvoie toutes les entités accessibles à l'utilisateur dont updated_at > since. Les soft-deletes apparaissent dans `deleted[]` plutôt que dans `entities[]`.
      tags:
        - sync
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 500
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Snapshot incremental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPullResponse"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
webhooks: {}
