  /v1/bdpm/version:
    get:
      summary: Version BDPM active sur le serveur
      description: Retourne la `version` (date YYYY-MM-DD) la plus récente parmi les médicaments en base, ou `null` si la base n'a jamais été importée.
      tags:
        - bdpm
      responses:
        "200":
          description: Version courante
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BdpmVersionResponse"
  /v1/bdpm/diff:
    get:
      summary: Médicaments ajoutés ou mis à jour depuis une date
      description: Retourne les lignes dont `version_bdpm > from`. Ne couvre PAS les CIS retirés de la BDPM (cf. limite documentée).
      tags:
        - bdpm
      parameters:
        - schema:
            type: string
            format: date
          required: true
          name: from
          in: query
      responses:
        "200":
          description: Diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BdpmDiffResponse"
        "400":
          description: Paramètre `from` invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BdpmApiError"
  /v1/bdpm/sqlite:
    get:
      summary: Télécharge le fichier SQLite BDPM mobile (gzippé)
      description: Sert le fichier SQLite généré depuis Postgres, gzippé. Le mobile envoie `?version=YYYY-MM-DD` pour skip le download si la version locale est à jour (réponse 304). En-tête `X-Piloo-Bdpm-Version` indique la version courante.
      tags:
        - bdpm
      responses:
        "200":
          description: SQLite gzippé
          content:
            application/x-sqlite3:
              schema:
                type: string
                format: binary
        "304":
          description: Version inchangée, pas de re-download nécessaire
  /v1/bdpm/search:
