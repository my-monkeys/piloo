          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
  /v1/prises/today:
    get:
      summary: Prises planifiées pour aujourd'hui (timeline)
      description: Renvoie les prises de l'officine demandée pour la date courante (fuseau serveur). Le statut + la prescription jointe sont inclus pour rendre la timeline sans roundtrip.
      tags:
        - prises
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: officine_id
          in: query
      responses:
        "200":
          description: Liste des prises du jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrisesResponse"
        "400":
          description: Query invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "403":
          description: Pas d'accès à cette officine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "404":
          description: Officine inconnue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
  /v1/prises/{id}:
    patch:
      summary: Valider, sauter ou réinitialiser une prise planifiée
      description: Marque la prise `prise` (avec horodatage de validation), `sautee` (idem), ou la repasse à `prevue` (datetime_validation remis à null). Pas de transition vers `oubliee` manuelle — c'est l'état terminal posé par le cron.
      tags:
        - prises
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePriseInput"
      responses:
        "200":
          description: Prise mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriseTimelineItem"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "403":
          description: Pas le droit (lecteur)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "404":
          description: Prise inconnue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
  /v1/prises:
    get:
      summary: Prises planifiées pour une date précise
      description: Variante de /v1/prises/today qui prend une date explicite (YYYY-MM-DD). Utilisé par le navigateur de calendrier du mobile.
      tags:
        - prises
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: officine_id
          in: query
        - schema:
            type: string
            format: date
          required: true
          name: date
          in: query
      responses:
        "200":
          description: Liste des prises de la date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrisesResponse"
        "400":
          description: Query invalide (date manquante / mal formée)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "403":
          description: Pas d'accès à cette officine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
        "404":
          description: Officine inconnue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrisesApiError"
  /v1/sync/push:
    post:
      summary: Pousse un batch d'opérations locales vers le serveur
      description: Idempotent par operation_id. Maximum 100 opérations par requête. Renvoie un ack par opération (applied | conflict | rejected).
      tags:
        - sync
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushRequest"
      responses:
        "200":
          description: Acks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPushResponse"
        "400":
          description: Body invalide ou batch > 100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
  /v1/sync/pull:
    get:
      summary: Récupère les entités modifiées depuis un timestamp
      description: Renvoie toutes les entités accessibles à l'utilisateur dont updated_at > since. Les soft-deletes apparaissent dans `deleted[]` plutôt que dans `entities[]`.
      tags:
        - sync
      parameters:
        - schema:
            type: string
            format: date-time
          required: false
          name: since
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 500
          required: false
          name: limit
          in: query
      responses:
        "200":
          description: Snapshot incremental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPullResponse"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApiError"
  /v1/alertes:
    get:
      summary: Liste paginée des alertes de l'utilisateur
      description: "Filtres optionnels par type et lues/non lues. Pagination cursor-based : passer `cursor` reçu dans `next_cursor` à la réponse précédente."
      tags:
        - alertes
      parameters:
        - schema:
            type: string
          required: false
          name: cursor
          in: query
        - schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - peremption_30j
              - peremption_7j
              - stock_bas
              - prise_oubliee
              - manque_signale
          required: false
          name: type
          in: query
        - schema:
            type: string
            enum:
              - "true"
              - "false"
          required: false
          name: unread_only
          in: query
      responses:
        "200":
          description: Page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAlertesResponse"
        "400":
          description: Cursor ou paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertesApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertesApiError"
  /v1/alertes/{id}/read:
    post:
      summary: Marque une alerte comme lue
      description: "Idempotent : si l'alerte est déjà marquée lue, on retourne 204 sans modifier."
      tags:
        - alertes
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Lue
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertesApiError"
        "404":
          description: Alerte inconnue ou non destinée à cet utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertesApiError"
  /v1/officines/{officineId}/signaler-manque:
    post:
      summary: Signale un manque de médicament dans une officine
      description: Tout membre (owner/editor/viewer) de l'officine peut signaler. Crée une alerte `manque_signale` pour chaque owner/editor (le signaleur exclu).
      tags:
        - alertes
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: officineId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalerManqueInput"
      responses:
        "201":
          description: Manque signalé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalerManqueResponse"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManqueApiError"
        "401":
          description: Non authentifié
          content:
