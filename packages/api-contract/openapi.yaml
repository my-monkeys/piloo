openapi: 3.1.0
info:
  title: Piloo API
  version: 0.0.0
  description: "API REST de Piloo — carnet numérique de médicaments. Source de vérité : les schémas Zod du package @piloo/api-contract."
servers:
  - url: http://localhost:3000/api
    description: Local dev
  - url: https://piloo.fr/api
    description: Production
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        version:
          type: string
          example: 0.0.0
        timestamp:
          type: string
          format: date-time
          example: 2026-05-02T12:00:00.000Z
      required:
        - status
        - version
        - timestamp
    ListOfficinesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Officine"
      required:
        - items
    Officine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        proprietaire_user_id:
          type: string
          format: uuid
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
        role:
          type: string
          enum:
            - owner
            - editor
            - viewer
      required:
        - id
        - nom
        - type
        - proprietaire_user_id
        - date_naissance
        - notes
        - created_at
        - updated_at
        - deleted_at
        - role
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    CreateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - nom
        - type
    UpdateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
  parameters: {}
paths:
  /health:
    get:
      summary: Liveness probe
      description: Renvoie le statut du serveur. Utilisé par les health checks Vercel et le monitoring.
      tags:
        - health
      responses:
        "200":
          description: Serveur OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/officines:
    get:
      summary: Liste les officines accessibles à l'utilisateur courant
      description: Renvoie les officines dont l'utilisateur est propriétaire OU sur lesquelles il a un partage actif.
      tags:
        - officines
      responses:
        "200":
          description: Liste
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOfficinesResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      summary: Crée une officine
      description: L'utilisateur courant devient propriétaire et un partage owner est créé automatiquement.
      tags:
        - officines
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfficineInput"
      responses:
        "201":
          description: Officine créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/officines/{id}:
    get:
      summary: Détail d'une officine
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Détail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas d'accès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Met à jour une officine
      description: Réservé aux rôles owner et editor.
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfficineInput"
      responses:
        "200":
          description: Officine mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Officine"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Supprime (soft-delete) une officine
      description: Réservé au propriétaire (rôle owner).
      tags:
        - officines
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "204":
          description: Supprimée
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Pas owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
webhooks: {}
