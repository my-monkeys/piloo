      responses:
        "201":
          description: Boîte créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Boite"
        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Officine introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
  /v1/boites/{id}:
    get:
      summary: Détail d'une boîte
