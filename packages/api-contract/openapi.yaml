openapi: 3.1.0
info:
  title: Piloo API
  version: 0.0.0
  description: "API REST de Piloo — carnet numérique de médicaments. Source de vérité : les schémas Zod du package @piloo/api-contract."
servers:
  - url: http://localhost:3000/api
    description: Local dev
  - url: https://piloo.fr/api
    description: Production
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        version:
          type: string
          example: 0.0.0
        timestamp:
          type: string
          format: date-time
          example: 2026-05-02T12:00:00.000Z
      required:
        - status
        - version
        - timestamp
    ListOfficinesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Officine"
      required:
        - items
    Officine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        proprietaire_user_id:
          type: string
          format: uuid
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
        role:
          type: string
          enum:
            - owner
            - editor
            - viewer
      required:
        - id
        - nom
        - type
        - proprietaire_user_id
        - date_naissance
        - notes
        - created_at
        - updated_at
        - deleted_at
        - role
    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    CreateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum:
            - perso
            - patient
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - nom
        - type
    UpdateOfficineInput:
      type: object
      properties:
        nom:
          type: string
          minLength: 1
          maxLength: 120
        date_naissance:
          type:
            - string
            - "null"
          format: date
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
    ListBoitesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Boite"
      required:
        - items
    Boite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officine_id:
          type: string
          format: uuid
        cip13:
          type: string
          pattern: ^\d{13}$
        lot:
          type:
            - string
            - "null"
          maxLength: 64
        numero_serie:
          type:
            - string
            - "null"
          maxLength: 64
        peremption:
          type: string
          format: date
        unites_initiales:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        statut:
          type: string
          enum:
            - active
            - vide
            - perimee
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        ajoutee_par:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
      required:
        - id
        - officine_id
        - cip13
        - lot
        - numero_serie
        - peremption
        - unites_initiales
        - unites_restantes
        - statut
        - notes
        - ajoutee_par
        - created_at
        - updated_at
        - deleted_at
    BoiteApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    CreateBoiteInput:
      type: object
      properties:
        cip13:
          type: string
          pattern: ^\d{13}$
        lot:
          type:
            - string
            - "null"
          maxLength: 64
        numero_serie:
          type:
            - string
            - "null"
          maxLength: 64
        peremption:
          type: string
          format: date
        unites_initiales:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - cip13
        - peremption
    UpdateBoiteInput:
      type: object
      properties:
        statut:
          type: string
          enum:
            - active
            - vide
            - perimee
        unites_restantes:
          type:
            - integer
            - "null"
          minimum: 0
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
    ListPrisesResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/PriseTimelineItem"
      required:
        - date
        - items
    PriseTimelineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officine_id:
          type: string
          format: uuid
        datetime_prevue:
          type: string
          format: date-time
        datetime_validation:
          type:
            - string
            - "null"
          format: date-time
        statut:
          type: string
          enum:
            - prevue
            - prise
            - sautee
            - oubliee
        notes:
          type:
            - string
            - "null"
        prescription:
          $ref: "#/components/schemas/PriseTimelinePrescription"
      required:
        - id
        - officine_id
        - datetime_prevue
        - datetime_validation
        - statut
        - notes
        - prescription
    PriseTimelinePrescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ordonnance_id:
          type: string
          format: uuid
        nom_texte:
          type: string
        cip13:
          type:
            - string
            - "null"
        indication:
          type:
            - string
            - "null"
        posologie:
          $ref: "#/components/schemas/Posologie"
      required:
        - id
        - ordonnance_id
        - nom_texte
        - cip13
        - indication
        - posologie
    Posologie:
      type: object
      additionalProperties: {}
    PrisesApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    UpdatePriseInput:
      type: object
      properties:
        statut:
          type: string
          enum:
            - prevue
            - prise
            - sautee
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        datetime_prevue:
          type: string
          format: date-time
    SyncPushResponse:
      type: object
      properties:
        acks:
          type: array
          items:
            $ref: "#/components/schemas/SyncAck"
        server_time:
          type: string
          format: date-time
      required:
        - acks
        - server_time
    SyncAck:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - applied
            - conflict
            - rejected
        reason:
          type: string
        server_version:
          $ref: "#/components/schemas/Boite"
      required:
        - operation_id
        - entity_id
        - status
    SyncApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    SyncPushRequest:
      type: object
      properties:
        client_id:
          type: string
          minLength: 1
          maxLength: 120
        operations:
          type: array
          items:
            oneOf:
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - create_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    allOf:
                      - $ref: "#/components/schemas/CreateBoiteInput"
                      - type: object
                        properties:
                          officine_id:
                            type: string
                            format: uuid
                        required:
                          - officine_id
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - update_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    $ref: "#/components/schemas/UpdateBoiteInput"
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - soft_delete_boite
                  entity_type:
                    type: string
                    enum:
                      - boite
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    type: object
                    properties: {}
                    additionalProperties: false
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - update_prise
                  entity_type:
                    type: string
                    enum:
                      - prise
                  entity_id:
                    type: string
                    format: uuid
                  payload:
                    $ref: "#/components/schemas/UpdatePriseInput"
                  timestamp_local:
                    type: integer
                    minimum: 0
                required:
                  - id
                  - type
                  - entity_type
                  - entity_id
                  - payload
                  - timestamp_local
          minItems: 1
          maxItems: 100
      required:
        - client_id
        - operations
    SyncPullResponse:
      type: object
      properties:
        entities:
          type: object
          properties:
            boites:
              type: array
              items:
                $ref: "#/components/schemas/Boite"
          required:
            - boites
        deleted:
          type: object
          properties:
            boites:
              type: array
              items:
                type: string
                format: uuid
          required:
            - boites
        server_time:
          type: string
          format: date-time
      required:
        - entities
        - deleted
        - server_time
    ListAlertesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Alerte"
        next_cursor:
          type:
            - string
            - "null"
      required:
        - items
        - next_cursor
    Alerte:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officine_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - peremption_30j
            - peremption_7j
            - stock_bas
            - prise_oubliee
            - manque_signale
        payload:
          type: object
          additionalProperties: {}
        lue_a:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - id
        - officine_id
        - user_id
        - type
        - payload
        - lue_a
        - created_at
    AlertesApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    SignalerManqueResponse:
      type: object
      properties:
        alertes_creees:
          type: integer
          minimum: 0
      required:
        - alertes_creees
    ManqueApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    SignalerManqueInput:
      type: object
      properties:
        cip13:
          type: string
          pattern: ^\d{13}$
        libelle:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          maxLength: 500
    NotifPreferencesResponse:
      type: object
      properties:
        rappel_prise:
          $ref: "#/components/schemas/NotifChannels"
        peremption:
          $ref: "#/components/schemas/NotifChannels"
        stock_bas:
          $ref: "#/components/schemas/NotifChannels"
        partage:
          $ref: "#/components/schemas/NotifChannels"
        manque_signale:
          $ref: "#/components/schemas/NotifChannels"
      required:
        - rappel_prise
        - peremption
        - stock_bas
        - partage
        - manque_signale
    NotifChannels:
      type: object
      properties:
        push:
          type: boolean
        email:
          type: boolean
        sms:
          type: boolean
      required:
        - push
        - email
        - sms
    NotifPrefsApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    UpdateNotifPreferencesInput:
      type: object
      properties:
        rappel_prise:
          $ref: "#/components/schemas/NotifChannels"
        peremption:
          $ref: "#/components/schemas/NotifChannels"
        stock_bas:
          $ref: "#/components/schemas/NotifChannels"
        partage:
          $ref: "#/components/schemas/NotifChannels"
        manque_signale:
          $ref: "#/components/schemas/NotifChannels"
      required:
        - rappel_prise
        - peremption
        - stock_bas
        - partage
        - manque_signale
    BdpmVersionResponse:
      type: object
      properties:
        version:
          type:
            - string
            - "null"
          format: date
        total_cis:
          type: integer
          minimum: 0
      required:
        - version
        - total_cis
    BdpmDiffResponse:
      type: object
      properties:
        from:
          type: string
          format: date
        current:
          type:
            - string
            - "null"
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/BdpmMedicament"
      required:
        - from
        - current
        - items
    BdpmMedicament:
      type: object
      properties:
        cis:
          type: string
        cip13:
          type:
            - string
            - "null"
          pattern: ^\d{7,13}$
        cip7:
          type:
            - string
            - "null"
          pattern: ^\d{7,13}$
        denomination:
          type: string
        forme:
          type:
            - string
            - "null"
        dosage:
          type:
            - string
            - "null"
        voie_administration:
          type:
            - string
            - "null"
        titulaire:
          type:
            - string
            - "null"
        statut_amm:
          type:
            - string
            - "null"
        taux_remboursement:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 100
        version_bdpm:
          type: string
          format: date
      required:
        - cis
        - cip13
        - cip7
        - denomination
        - forme
        - dosage
        - voie_administration
        - titulaire
        - statut_amm
        - taux_remboursement
        - version_bdpm
    BdpmApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    BdpmSearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BdpmMedicament"
      required:
        - items
    ListDevicesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Device"
      required:
        - items
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        platform:
          type: string
          enum:
            - ios
            - android
            - web
        app_version:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - platform
        - app_version
        - created_at
        - last_seen_at
    DevicesApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    RegisterDeviceInput:
      type: object
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 4096
        platform:
          type: string
          enum:
            - ios
            - android
            - web
        app_version:
          type: string
          maxLength: 64
      required:
        - token
        - platform
    ListOrdonnancesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Ordonnance"
      required:
        - items
    Ordonnance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        officine_id:
          type: string
          format: uuid
        prescripteur:
          type:
            - string
            - "null"
          maxLength: 255
        date_prescription:
          type: string
          format: date
        source:
          type: string
          enum:
            - manuelle
            - ocr
        photo_url:
          type:
            - string
            - "null"
          maxLength: 2048
          format: uri
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        saisie_par:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
      required:
        - id
        - officine_id
        - prescripteur
        - date_prescription
        - source
        - photo_url
        - notes
        - saisie_par
        - created_at
        - updated_at
        - deleted_at
    OrdonnanceApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: {}
          required:
            - code
            - message
      required:
        - error
    OrdonnanceWithPrescriptions:
      allOf:
        - $ref: "#/components/schemas/Ordonnance"
        - type: object
          properties:
            prescriptions:
              type: array
              items:
                $ref: "#/components/schemas/Prescription"
          required:
            - prescriptions
    Prescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ordonnance_id:
          type: string
          format: uuid
        cip13:
          type:
            - string
            - "null"
          pattern: ^\d{13}$
        cis:
          type:
            - string
            - "null"
          maxLength: 16
        nom_texte:
          type: string
          minLength: 1
          maxLength: 255
        posologie:
          $ref: "#/components/schemas/Posologie"
        duree_jours:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
          maximum: 3650
        indication:
          type:
            - string
            - "null"
          maxLength: 255
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type:
            - string
            - "null"
          format: date-time
      required:
        - id
        - ordonnance_id
        - cip13
        - cis
        - nom_texte
        - posologie
        - duree_jours
        - indication
        - notes
        - created_at
        - updated_at
        - deleted_at
    CreateOrdonnanceInput:
      type: object
      properties:
        prescripteur:
          type:
            - string
            - "null"
          maxLength: 255
        date_prescription:
          type: string
          format: date
        source:
          type: string
          enum:
            - manuelle
            - ocr
        photo_url:
          type:
            - string
            - "null"
          maxLength: 2048
          format: uri
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
        prescriptions:
          type: array
          items:
            $ref: "#/components/schemas/CreatePrescriptionInput"
          maxItems: 50
      required:
        - date_prescription
    CreatePrescriptionInput:
      type: object
      properties:
        cip13:
          type:
            - string
            - "null"
          pattern: ^\d{13}$
        cis:
          type:
            - string
            - "null"
          maxLength: 16
        nom_texte:
          type: string
          minLength: 1
          maxLength: 255
        posologie:
          $ref: "#/components/schemas/Posologie"
        duree_jours:
          type:
            - integer
            - "null"
          exclusiveMinimum: 0
          maximum: 3650
        indication:
          type:
            - string
            - "null"
          maxLength: 255
        notes:
          type:
            - string
            - "null"
          maxLength: 2000
      required:
        - nom_texte
        - posologie
    UpdateOrdonnanceInput:
      type: object
      properties:
        prescripteur:
          type:
            - string
