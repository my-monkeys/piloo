        "400":
          description: Body invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "403":
          description: Rôle insuffisant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
        "404":
          description: Inconnue ou inaccessible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoiteApiError"
    delete:
      summary: Supprime (soft-delete) une boîte
