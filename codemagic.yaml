# Codemagic CI/CD — Piloo (monorepo Turborepo).
#
# Décision : ADR docs/adr/0002-flutter-ci.md (Codemagic retenu pour M1/M2).
# Doc opérateur : docs/deploy-mobile-ios.md (certs, secrets, runbook).
#
# IMPORTANT : Codemagic charge le yaml à la racine du repo. Les commandes
# Flutter / Dart doivent donc s'exécuter via `working_directory: apps/mobile`
# (le projet Flutter vit là-bas dans le monorepo). Idem pour les artefacts
# qui utilisent des chemins absolus depuis la racine.
#
# Workflows définis :
#   - ios-testflight       : build IPA + upload TestFlight, déclenché par tag `v*`
#                            (et exclu pour les tags `v*-demo`).
#   - ios-demo-testflight  : build "navigateur d'écrans" qui boote directement
#                            sur la route `/_dev` (DevHomeScreen). Déclenché
#                            par tag `v*-demo`. Pour faire tourner sur device
#                            sans backend ni session, utile à la review interne.
#   - ios-pr-check         : `flutter analyze` + `flutter test` sur PR (pas de signing).
#   - android-release      : build AAB + APK signés, Play Console internal sur tag `v*`
#                            (exclu pour les tags `v*-demo`).
#
# NB : pour les builds Android demo (boot sur /_dev) on n'utilise PAS Codemagic
# mais GitHub Actions (`.github/workflows/android-demo-release.yml`) qui publie
# l'APK signé directement sur GitHub Releases — pas besoin de Play Console.

workflows:
  ios-testflight:
    name: iOS — Build & TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Tag `v*` uniquement. Les pushes sur branches sont gérés par `ios-pr-check`.
    triggering:
      events:
        - tag
      tag_patterns:
        # Tags `v*` SAUF `v*-demo` (réservés au workflow demo, voir plus bas).
        - pattern: "v*"
          include: true
        - pattern: "v*-demo"
          include: false

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      # Les variables `APP_STORE_CONNECT_*` sont auto-injectées par
      # l'intégration `app_store_connect` ci-dessous (cf. integrations).
      # Pas besoin de doublonner via un groupe.
      groups:
        - ios_signing # CERTIFICATE_PRIVATE_KEY (clé privée du distribution certificate)

      vars:
        BUNDLE_ID: "fr.mymonkey.piloo"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    # Intégration App Store Connect API : auto-fetch du provisioning profile + cert.
    integrations:
      app_store_connect: Personnal

    scripts:
      - name: Vérifier que le tag respecte le format vX.Y.Z
        script: |
          set -euo pipefail
          if [[ ! "${CM_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag invalide : '${CM_TAG}' (attendu : vX.Y.Z, ex. v1.2.3)" >&2
            exit 1
          fi
          echo "✅ Tag valide : ${CM_TAG}"

      - name: Dériver la version Flutter depuis le tag git
        # Convention : tag v1.2.3 → pubspec version "1.2.3+<build_number>".
        # Le build_number Codemagic est monotone par projet → garantit l'unicité côté App Store.
        working_directory: apps/mobile
        script: |
          set -euo pipefail
          VERSION_NAME="${CM_TAG#v}"
          BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-1}}"
          echo "VERSION_NAME=${VERSION_NAME}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}"
          # Patch in-place du pubspec — non commité, juste pour ce build.
          sed -i.bak -E "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Générer le client Dart OpenAPI (gitignored)
        # Le package piloo_api_client (lib/gen/openapi/) est gitignored.
        # Sans cette étape, `flutter pub get` échoue avec "could not find
        # package piloo_api_client at lib/gen/openapi".
        script: |
          set -eu
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm install --frozen-lockfile
          pnpm openapi:generate-dart-client

      - name: Installer les dépendances Flutter
        working_directory: apps/mobile
        script: flutter pub get

      - name: Générer le code (freezed / json / build_runner app)
        # Tolérant si le projet n'a pas encore de code generation (M1 early).
        # Le client Dart OpenAPI est généré au-dessus, indépendamment.
        working_directory: apps/mobile
        script: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner non configuré — skip"
          fi

      - name: Analyse statique
        working_directory: apps/mobile
        script: flutter analyze --no-fatal-infos

      - name: Tests unitaires
        working_directory: apps/mobile
        script: flutter test

      - name: Provisionner le certificat de distribution iOS
        # Codemagic récupère/crée auto le provisioning profile via l'API App Store Connect.
        # Le distribution certificate doit être fourni via le groupe `ios_signing`
        # (variable `CERTIFICATE_PRIVATE_KEY`) — voir docs/deploy-mobile-ios.md.
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "${BUNDLE_ID}" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA (release, signé)
        working_directory: apps/mobile
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # API key Codemagic-managed (cf. integrations).
        # Submit_to_testflight: true pour traitement automatique côté Apple.
        # Pas de submit_to_app_store : la promotion vers App Store reste manuelle (review humaine).
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Piloo Internes"

      email:
        # Fallback notification — Slack/Discord à brancher plus tard si besoin.
        recipients:
          - dev@piloo.app
        notify:
          success: true
          failure: true

  ios-demo-testflight:
    # Variante du workflow ios-testflight qui produit un build "demo
    # navigator" : l'app boote directement sur l'écran /_dev (liste
    # cliquable des 32 écrans), permettant de présenter le produit
    # sur device sans backend/session/onboarding.
    #
    # Distribué sur le même TestFlight (groupe "Piloo Demos") — Apple
    # incrémente le build_number, donc on peut alterner builds prod
    # et builds demo sans collision.
    name: iOS — Demo Navigator (boot sur /_dev)
    instance_type: mac_mini_m2
    max_build_duration: 60

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*-demo"
          include: true

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing # CERTIFICATE_PRIVATE_KEY (cf. ios-testflight pour la rationale)
      vars:
        BUNDLE_ID: "fr.mymonkey.piloo"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        # Override boot route lu par lib/core/router/router.dart au build.
        # Le DevHomeScreen liste tous les écrans M1, idéal pour démo.
        PILOO_BOOT_ROUTE: "/_dev"

    integrations:
      app_store_connect: Personnal

    scripts:
      - name: Vérifier le format du tag (vX.Y.Z-demo)
        script: |
          set -euo pipefail
          if [[ ! "${CM_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-demo$ ]]; then
            echo "❌ Tag invalide : '${CM_TAG}' (attendu vX.Y.Z-demo)" >&2
            exit 1
          fi
          echo "✅ Tag demo : ${CM_TAG}"

      - name: Dériver la version Flutter depuis le tag (sans suffixe -demo)
        working_directory: apps/mobile
        script: |
          set -euo pipefail
          TAG_NO_PREFIX="${CM_TAG#v}"
          VERSION_NAME="${TAG_NO_PREFIX%-demo}"
          BUILD_NUMBER="${BUILD_NUMBER:-${PROJECT_BUILD_NUMBER:-1}}"
          echo "VERSION_NAME=${VERSION_NAME}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}"
          sed -i.bak -E "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Générer le client Dart OpenAPI (gitignored)
        script: |
          set -eu
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm install --frozen-lockfile
          pnpm openapi:generate-dart-client

      - name: Installer les dépendances Flutter
        working_directory: apps/mobile
        script: flutter pub get

      - name: Générer le code (best-effort)
        working_directory: apps/mobile
        script: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          else
            echo "build_runner non configuré — skip"
          fi

      - name: Analyse statique
        working_directory: apps/mobile
        script: flutter analyze --no-fatal-infos

      - name: Tests unitaires
        working_directory: apps/mobile
        script: flutter test

      - name: Provisionner le certificat de distribution iOS
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "${BUNDLE_ID}" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA (release, signé, boot sur /_dev)
        working_directory: apps/mobile
        script: |
          flutter build ipa --release \
            --dart-define=PILOO_BOOT_ROUTE=${PILOO_BOOT_ROUTE} \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Groupe distinct des builds prod pour éviter d'envoyer un
        # build demo aux testeurs habituels par erreur.
        beta_groups:
          - "Piloo Demos"

      email:
        recipients:
          - dev@piloo.app
        notify:
          success: true
          failure: true

  ios-pr-check:
    name: iOS — PR check (analyze + test)
    instance_type: mac_mini_m2
    max_build_duration: 20

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "main"
          include: true
          source: false

    environment:
      flutter: stable

    scripts:
      - name: Générer le client Dart OpenAPI (gitignored)
        script: |
          set -eu
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm install --frozen-lockfile
          pnpm openapi:generate-dart-client
      - name: Installer les dépendances
        working_directory: apps/mobile
        script: flutter pub get
      - name: Générer le code (best-effort)
        working_directory: apps/mobile
        script: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          fi
      - name: flutter analyze
        working_directory: apps/mobile
        script: flutter analyze --no-fatal-infos
      - name: flutter test
        working_directory: apps/mobile
        script: flutter test

  android-release:
    name: Android Release (Play Console internal track)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        # KEYSTORE_FILE (base64), KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
        - android_keystore
        # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (JSON contents)
        - google_play
      vars:
        PACKAGE_NAME: "fr.mymonkey.piloo"
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true
        - pattern: "v*-demo"
          include: false
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.pub-cache
    scripts:
      - name: Decode keystore from CI secret
        script: |
          set -eu
          mkdir -p apps/mobile/android/app
          echo "$KEYSTORE_FILE" | base64 --decode > apps/mobile/android/app/keystore.jks
          test -s apps/mobile/android/app/keystore.jks
      - name: Write key.properties
        script: |
          set -eu
          cat <<EOF > apps/mobile/android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
      - name: Sync version from git tag
        script: |
          set -eu
          TAG="${CM_TAG:-}"
          if [ -z "$TAG" ]; then
            echo "CM_TAG is empty; this workflow only runs on tag pushes." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          cd apps/mobile
          # pubspec version: <semver>+<build_number>; required by Play Console.
          sed -i.bak -E "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep "^version: " pubspec.yaml
      - name: Générer le client Dart OpenAPI (gitignored)
        script: |
          set -eu
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm install --frozen-lockfile
          pnpm openapi:generate-dart-client
      - name: Resolve Flutter packages
        working_directory: apps/mobile
        script: flutter pub get
      - name: Static analysis
        working_directory: apps/mobile
        script: flutter analyze --no-fatal-infos
      - name: Unit tests
        working_directory: apps/mobile
        script: flutter test
      - name: Build signed AAB (Play upload)
        working_directory: apps/mobile
        script: flutter build appbundle --release
      - name: Build signed APK (internal distribution)
        working_directory: apps/mobile
        script: flutter build apk --release
    artifacts:
      - apps/mobile/build/**/outputs/**/*.aab
      - apps/mobile/build/**/outputs/**/*.apk
      - apps/mobile/build/**/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
        in_app_update_priority: 0

  # NB : pas d'`android-demo-release` ici. Le build APK demo Android est
  # géré par GitHub Actions (`.github/workflows/android-demo-release.yml`)
  # qui publie l'APK signé directement sur GitHub Releases. Permet de
  # bypass Play Console / Service Account et de partager le lien APK
  # avec les testeurs Android sans signup Google Play.
