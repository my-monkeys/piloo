name: Build iOS

# Release iOS officielle (remplace Codemagic — ADR docs/adr/0005-github-actions-ios.md).
# Tag `v*` (le même que android-release.yml : un tag = les deux plateformes) ou
# manuel (bouton « Run workflow ») → build sur runner macOS (Xcode GM du runner,
# pas de beta), signé, uploadé sur TestFlight. Règle les blocages de version
# Xcode (beta refusée / GM local trop ancien) en déléguant le build à l'Xcode
# du runner GitHub. Calqué sur la CI iOS de `glance`.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "!v*-demo" # flux demo iOS abandonné (servi 1 fois) — cf. #387

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.7
          cache: true

      # Le client Dart OpenAPI (piloo_api_client, dépendance path de l'app) est
      # généré et gitignoré → il faut le régénérer avant `flutter pub get`,
      # comme dans mobile-ci.yml. openapi-generator = Java ; le script = pnpm.
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install JS deps (root)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Generate Dart OpenAPI client (gitignored)
        working-directory: ${{ github.workspace }}
        run: pnpm openapi:generate-dart-client

      # Sur tag vX.Y.Z : version dérivée du tag (convention Codemagic conservée).
      # En dispatch : le build-name du pubspec est gardé tel quel. Build number
      # epoch, unique + croissant → jamais de collision TestFlight.
      - name: Version depuis le tag + numéro de build unique
        run: |
          BN=$(date +%s)
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "❌ Tag invalide : '$GITHUB_REF_NAME' (attendu : vX.Y.Z)" >&2
              exit 1
            fi
            VN="${GITHUB_REF_NAME#v}"
            sed -i '' -E "s/^version: .*/version: ${VN}+${BN}/" pubspec.yaml
          else
            sed -i '' -E "s/^(version: [0-9.]+)\+.*/\1+${BN}/" pubspec.yaml
          fi
          grep '^version:' pubspec.yaml

      # Certificat de distribution (Apple Distribution) dans un trousseau dédié.
      - name: Importer le certificat de distribution
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KC_PW: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$CERT_PW" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"

      # Clé API App Store Connect (profil App Store + upload TestFlight).
      - name: Clé API App Store Connect
        env:
          KEY_B64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$KEY_B64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"

      - run: flutter pub get

      # Parité Codemagic : fail fast avant de payer les ~10 min de build signé.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

      - run: flutter build ios --release --no-codesign

      - name: Build signé + upload TestFlight (fastlane)
        working-directory: apps/mobile/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          export ASC_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          fastlane beta

      - name: Archiver l'IPA en artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: piloo-ios-ipa
          path: apps/mobile/ios/build/Piloo.ipa
          if-no-files-found: ignore
