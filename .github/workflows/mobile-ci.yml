name: mobile-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: analyze / test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # `--no-fatal-infos` : les déprécations transitives (Flutter SDK,
        # test_api, etc.) sont info-level et ne doivent pas bloquer le CI.
        # Aligné avec le workflow web (qui faisait déjà ce choix).
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
