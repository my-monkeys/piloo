name: mobile-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/api-contract/**"
      - ".github/workflows/mobile-ci.yml"

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: analyze / test
    runs-on: [self-hosted, linux, cookie]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # openapi:generate-dart-client s'appuie sur openapi-generator (Java).
      # Le runner cookie n'a pas de Java système → on l'installe ici (aligné
      # sur android-release.yml).
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # cf. android-release.yml — pin pour phosphor_flutter 2.1.0
          channel: stable
          flutter-version: 3.38.7
          cache: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install JS deps (root)
        run: pnpm install --frozen-lockfile

      - name: Generate Dart OpenAPI client (gitignored)
        run: pnpm openapi:generate-dart-client

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        # `--no-fatal-infos` : les déprécations transitives (Flutter SDK,
        # test_api, etc.) sont info-level et ne doivent pas bloquer le CI.
        # Aligné avec le workflow web (qui faisait déjà ce choix).
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: apps/mobile
        run: flutter test
