name: e2e

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (web)
    runs-on: [self-hosted, linux, cookie]
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: piloo
          POSTGRES_PASSWORD: piloo
          POSTGRES_DB: piloo_e2e
        # Port hôte DYNAMIQUE : le runner self-hosted est partagé, un
        # port fixe (5432) finit toujours squatté par un autre projet
        # (#393). L'URL est injectée via GITHUB_ENV au premier step.
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      BETTER_AUTH_SECRET: e2e-secret-not-used-in-prod-1234567890abcdef
      BETTER_AUTH_URL: http://localhost:3100
      NEXT_PUBLIC_APP_URL: http://localhost:3100
      PILOO_DISABLE_EMAIL_VERIFICATION: "1"

    steps:
      # job.services n'est pas accessible dans jobs.<id>.env → on exporte
      # les URLs DB (port dynamique du service) via GITHUB_ENV.
      - name: Exposer l'URL de la DB e2e (port dynamique)
        run: |
          DB_URL="postgres://piloo:piloo@localhost:${{ job.services.postgres.ports['5432'] }}/piloo_e2e"
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "DATABASE_POOL_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI + TS client (skip Dart — pas de Flutter en CI E2E)
        run: pnpm turbo run openapi:generate openapi:generate-ts-client

      - name: Apply DB migrations
        run: pnpm db:migrate

      - name: Install Playwright browser (Chromium)
        # Pas de `--with-deps` : il tenterait un `sudo apt-get` (le user
        # gh-runner n'a pas de sudo sans mot de passe). Les libs système
        # Chromium sont déjà présentes sur le runner cookie → on télécharge
        # seulement le binaire du navigateur.
        run: pnpm --filter web exec playwright install chromium

      - name: Run E2E
        run: pnpm --filter web e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
