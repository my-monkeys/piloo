name: web-ci

on:
  pull_request:
    branches: [main]

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test / openapi
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        # Node 22+ requis pour --experimental-strip-types (utilisé par les
        # scripts orchestrateurs et le générateur OpenAPI du package
        # @piloo/api-contract). Voir aussi `engines.node` dans package.json.
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Audit logs (#97)
        run: pnpm --filter web audit:logs

      - name: OpenAPI contract check
        run: pnpm openapi:check

      - name: Verify generated artifacts are committed
        run: git diff --exit-code
