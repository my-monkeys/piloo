# Android release : build APK signé "normal" (boot sur splash habituel)
# et publie sur GitHub Releases. Déclenché par tag `v*` (pas `v*-demo`).
#
# Pourquoi GitHub Actions et pas Codemagic :
#  - Linux runner gratuit (vs Mac mini Codemagic facturé)
#  - Pas besoin de Google Play account / Service Account
#  - Distribution APK direct : tu télécharges + installes sans Store
#
# Pour iOS, voir codemagic.yaml workflow `ios-testflight` (besoin
# Apple Developer + App Store Connect API key — pas d'équivalent gratuit).
#
# Secrets requis (déjà configurés au 2026-05-07) :
#  - ANDROID_KEYSTORE_BASE64
#  - ANDROID_KEYSTORE_PASSWORD
#  - ANDROID_KEY_PASSWORD
#  - ANDROID_KEY_ALIAS

name: android-release

on:
  push:
    tags:
      - "v*"
      - "!v*-demo" # géré par android-demo-release.yml

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build APK signé + publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git rev-list pour build number

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install JS deps (root, for openapi-generator-cli)
        run: pnpm install --frozen-lockfile

      - name: Generate Dart OpenAPI client (gitignored)
        run: pnpm openapi:generate-dart-client

      - name: Vérifier le format du tag (vX.Y.Z)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag invalide : '${TAG}' (attendu vX.Y.Z, ex. v0.1.0)" >&2
            exit 1
          fi
          echo "✅ Tag : ${TAG}"

      - name: Dériver la version Flutter depuis le tag
        run: |
          set -eu
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "VERSION_NAME=${VERSION_NAME}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}"
          cd apps/mobile
          sed -i.bak -E "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep "^version:" pubspec.yaml

      - name: Decode keystore depuis secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eu
          mkdir -p apps/mobile/android/app
          echo "${KEYSTORE_BASE64}" | base64 --decode > apps/mobile/android/app/keystore.jks
          test -s apps/mobile/android/app/keystore.jks
          echo "✅ keystore décodé"

      - name: Écrire key.properties
        env:
          STORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -eu
          cat <<EOF > apps/mobile/android/key.properties
          storePassword=${STORE_PWD}
          keyPassword=${KEY_PWD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
          test -s apps/mobile/android/key.properties
          echo "✅ key.properties écrit"

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        working-directory: apps/mobile
        run: flutter test

      - name: Build APK signé (release, boot normal)
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Renommer l'APK avec le tag
        run: |
          set -eu
          SRC="apps/mobile/build/app/outputs/flutter-apk/app-release.apk"
          DST="apps/mobile/build/app/outputs/flutter-apk/piloo-${GITHUB_REF_NAME}.apk"
          mv "${SRC}" "${DST}"
          echo "APK_PATH=${DST}" >> "$GITHUB_ENV"
          ls -lh "${DST}"

      - name: Cleanup secrets locaux
        if: always()
        run: |
          rm -f apps/mobile/android/key.properties
          rm -f apps/mobile/android/app/keystore.jks

      - name: Create GitHub Release avec l'APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Build Android signé pointant sur https://piloo.vercel.app.

            **Installation** :
            1. Télécharge `piloo-${{ github.ref_name }}.apk` ci-dessous depuis ton téléphone Android
            2. Autoriser l'install depuis cette source si Android le demande (Réglages → Sécurité → "Sources inconnues")
            3. Ouvre l'app → Welcome → sign-up ou sign-in
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
