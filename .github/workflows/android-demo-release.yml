# Android demo release : build APK signé qui boote sur /_dev et publie
# sur GitHub Releases. Déclenché par tag `v*-demo`.
#
# Pourquoi GitHub Actions et pas Codemagic pour Android :
#  - Linux runner gratuit (vs Mac mini Codemagic facturé)
#  - Distribution APK direct via GitHub Releases : pas besoin de
#    Play Console / Service Account Google Cloud / track Internal
#  - Les testeurs installent en cliquant le lien APK depuis leur
#    téléphone (1 toggle Android "Sources inconnues" requis).
#
# Secrets requis dans `Settings → Secrets and variables → Actions` :
#  - ANDROID_KEYSTORE_BASE64       : `base64 -i piloo-release.jks | pbcopy`
#  - ANDROID_KEYSTORE_PASSWORD     : store password choisi à la génération
#  - ANDROID_KEY_PASSWORD          : key password choisi à la génération
#  - ANDROID_KEY_ALIAS             : "piloo" (ou ce que tu as choisi)

name: android-demo-release

on:
  push:
    tags:
      - "v*-demo"

permissions:
  contents: write # nécessaire pour créer la release

concurrency:
  group: android-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build APK signé + publish GitHub Release
    runs-on: [self-hosted, linux, cookie]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # pour git rev-list --count HEAD (build number)

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # cf. android-release.yml — pin pour phosphor_flutter 2.1.0
          channel: stable
          flutter-version: 3.38.7
          cache: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install JS deps (root)
        run: pnpm install --frozen-lockfile

      - name: Generate Dart OpenAPI client (gitignored)
        run: pnpm openapi:generate-dart-client

      - name: Vérifier le format du tag (vX.Y.Z-demo)
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-demo$ ]]; then
            echo "❌ Tag invalide : '${TAG}' (attendu vX.Y.Z-demo)" >&2
            exit 1
          fi
          echo "✅ Tag demo : ${TAG}"

      - name: Dériver la version Flutter depuis le tag
        run: |
          set -eu
          TAG_NO_PREFIX="${GITHUB_REF_NAME#v}"
          VERSION_NAME="${TAG_NO_PREFIX%-demo}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "VERSION_NAME=${VERSION_NAME}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}"
          cd apps/mobile
          sed -i.bak -E "s/^version: .*/version: ${VERSION_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep "^version:" pubspec.yaml

      - name: Decode keystore depuis secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eu
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "❌ Secret ANDROID_KEYSTORE_BASE64 manquant" >&2
            exit 1
          fi
          echo "${KEYSTORE_BASE64}" | base64 --decode > apps/mobile/android/app/keystore.jks
          test -s apps/mobile/android/app/keystore.jks
          echo "✅ Keystore décodé ($(wc -c < apps/mobile/android/app/keystore.jks) bytes)"

      - name: Write key.properties
        env:
          STORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -eu
          cat <<EOF > apps/mobile/android/key.properties
          storePassword=${STORE_PWD}
          keyPassword=${KEY_PWD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
          # Sanity check sans afficher les valeurs
          test -s apps/mobile/android/key.properties
          echo "✅ key.properties écrit"

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        working-directory: apps/mobile
        run: flutter test

      - name: Build APK signé (release, boot sur /_dev)
        working-directory: apps/mobile
        run: |
          flutter build apk --release \
            --dart-define=PILOO_BOOT_ROUTE=/_dev

      - name: Renommer l'APK avec le tag pour la release
        run: |
          set -eu
          SRC="apps/mobile/build/app/outputs/flutter-apk/app-release.apk"
          DST="apps/mobile/build/app/outputs/flutter-apk/piloo-${GITHUB_REF_NAME}.apk"
          mv "${SRC}" "${DST}"
          echo "APK_PATH=${DST}" >> "$GITHUB_ENV"
          ls -lh "${DST}"

      - name: Cleanup secrets locaux (paranoïa)
        if: always()
        run: |
          rm -f apps/mobile/android/key.properties
          rm -f apps/mobile/android/app/keystore.jks

      - name: Create GitHub Release avec l'APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} — Demo Navigator
          body: |
            Build demo navigator (boot direct sur l'écran `/_dev`).

            Installe l'APK directement sur Android :
            1. Télécharge `piloo-${{ github.ref_name }}.apk` ci-dessous depuis ton téléphone
            2. Autoriser l'install depuis cette source si Android le demande
            3. Ouvre l'app → arrive sur la liste des écrans M1
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: true
